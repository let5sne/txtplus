name: Release

# Tag-driven. Push `v1.0.0` to cut a release. Version is read from the tag.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4

      - name: Version
        id: ver
        run: echo "version=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Build
        run: ./build.sh

      - name: Verify bundle
        run: |
          test -x "build/TxtPlus.app/Contents/MacOS/TxtPlus"
          codesign --verify --deep --strict "build/TxtPlus.app"

      # Ad-hoc signed (no Developer ID), so no notarization. Build a drag-to-Applications DMG.
      # Users open via right-click → Open the first time (Gatekeeper bypass for ad-hoc).
      - name: Create DMG
        run: |
          mkdir -p dist
          # hdiutil fails if a volume with the same name is already mounted; use a unique name.
          DMG="dist/TxtPlus-${{ steps.ver.outputs.version }}.dmg"
          # create-dmg not guaranteed on runners; build a simple symlink DMG manually.
          STAGE="$(mktemp -d)"
          mkdir -p "$STAGE"
          ln -s /Applications "$STAGE/Applications"
          cp -R build/TxtPlus.app "$STAGE/TxtPlus.app"
          hdiutil create -volname "TxtPlus" -srcfolder "$STAGE" -ov -fs HFS+ -format UDZO "$DMG"
          rm -rf "$STAGE"

      - name: Release
        uses: softprops/action-gh-release@v2
        with:
          name: TxtPlus ${{ steps.ver.outputs.version }}
          generate_release_notes: true
          files: dist/TxtPlus-${{ steps.ver.outputs.version }}.dmg
